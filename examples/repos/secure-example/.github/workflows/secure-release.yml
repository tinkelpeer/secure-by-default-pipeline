name: secure-release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions: {}

env:
  IMAGE_NAME: ghcr.io/example/secure-example
  EXPECTED_WORKFLOW_PATH: .github/workflows/secure-release.yml
  EXPECTED_BRANCH: main
  SBOM_FILE: sbom.spdx.json

jobs:
  build-sign-attest-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/example/secure-example:latest
      - name: Export immutable image reference
        run: |
          echo "IMAGE_DIGEST=${{ steps.build.outputs.digest }}" >> "$GITHUB_ENV"
          echo "IMAGE_DIGEST_REF=${IMAGE_NAME}@${{ steps.build.outputs.digest }}" >> "$GITHUB_ENV"
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_DIGEST_REF }}
          format: spdx-json
          output-file: ${{ env.SBOM_FILE }}
      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Generate SBOM attestation
        uses: actions/attest-sbom@v3
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: ${{ env.SBOM_FILE }}
          push-to-registry: true
      - name: Sign image with Cosign keyless signing
        run: cosign sign --yes "${IMAGE_DIGEST_REF}"
      - name: Verify policy
        run: ./scripts/verify-image.sh "${IMAGE_DIGEST_REF}" "example/secure-example" "${EXPECTED_WORKFLOW_PATH}" "${EXPECTED_BRANCH}"
      - name: Verify expected deny example
        run: ./scripts/deny-example.sh "${IMAGE_DIGEST_REF}" "example/secure-example"
