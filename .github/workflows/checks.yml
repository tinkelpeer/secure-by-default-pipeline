name: checks

on:
  pull_request:
    branches: ["main"]
  push:
    branches-ignore: ["main"]

permissions:
  contents: read

jobs:
  test-and-policy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run static secure-pipeline checks
        run: python -m sbd_pipeline.cli check --repo . --format table

      - name: Run tests
        run: python -m pytest
